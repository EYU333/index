<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>🧪 实验室·语音识物 (20图)</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(145deg, #1e3c4f 0%, #0f2838 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      padding: 16px;
      margin: 0;
    }
    .app-container {
      width: 100%;
      max-width: 900px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 56px;
      padding: 24px 22px 32px;
      box-shadow: 0 25px 40px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
    }
    h1 {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #f5eee6;
      font-weight: 500;
      font-size: 2.4rem;
      margin-bottom: 18px;
      padding-left: 8px;
      text-shadow: 0 4px 10px #00000040;
    }
    h1 i { color: #ffd966; font-size: 2.2rem; }
    .score-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #10222bc9;
      padding: 14px 24px;
      border-radius: 60px;
      margin-bottom: 24px;
      color: white;
      backdrop-filter: blur(4px);
      border: 1px solid #4f7e9e;
      flex-wrap: wrap;
      gap: 10px;
    }
    .score-box, .question-box {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .score-box i { color: #f7c948; font-size: 30px; }
    .score-box span {
      font-size: 38px;
      font-weight: 800;
      background: #00000030;
      padding: 4px 22px;
      border-radius: 48px;
      color: #fae467;
    }
    .question-box {
      background: #244a61;
      padding: 8px 26px;
      border-radius: 40px;
      font-size: 1.5rem;
      font-weight: 600;
    }
    .timer-area {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #0d1f29;
      padding: 8px 24px;
      border-radius: 40px;
      color: #b9d9ff;
    }
    .timer-number {
      font-size: 36px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      min-width: 70px;
      text-align: center;
      color: #fcd34d;
    }
    .canvas-card {
      background: #d9e9f5;
      border-radius: 48px;
      padding: 20px 12px 15px;
      margin-bottom: 18px;
      box-shadow: inset 0 0 0 1px #ffffffb0, 0 12px 18px -8px black;
    }
    .drawing-container {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fbfdff;
      border-radius: 40px;
      padding: 18px;
      box-shadow: inset 0 4px 10px #0000001a;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      max-width: 560px;
      border-radius: 28px;
      background: #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      touch-action: none;
    }
    .feedback-area {
      min-height: 60px;
      margin: 8px 0 18px;
      padding: 10px 24px;
      background: #173e54e0;
      border-radius: 50px;
      display: flex;
      align-items: center;
      backdrop-filter: blur(4px);
      border-left: 8px solid #7aa5c2;
      color: #eef4ff;
      font-size: 1.3rem;
      font-weight: 500;
    }
    .action-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-top: 8px;
    }
    .btn {
      background: #2a4b64;
      border: none;
      border-bottom: 6px solid #0f1e29;
      color: white;
      padding: 18px 32px;
      border-radius: 60px;
      font-size: 1.7rem;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 6px 0 #0f1e29, 0 10px 20px #00000050;
      cursor: pointer;
      transition: all 0.08s;
      flex: 0 1 auto;
      min-width: 180px;
      backdrop-filter: blur(5px);
      border: 1px solid #6f97b5;
    }
    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #0f1e29, 0 8px 16px #00000050;
      border-bottom-width: 3px;
    }
    .btn:disabled {
      opacity: 0.5;
      transform: none;
      box-shadow: 0 6px 0 #0f1e29, 0 5px 12px #00000040;
      pointer-events: none;
      filter: grayscale(0.4);
    }
    .btn-primary { background: #2a6b96; border-bottom-color: #143850; }
    .btn-mic { background: #9b4b6e; border-bottom-color: #5f2e45; }
    .btn-warning { background: #b3622e; border-bottom-color: #6e3d1a; }
    .footer-note {
      color: #bed7e8;
      margin-top: 24px;
      text-align: center;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
<div class="app-container">
  <h1><i class="fas fa-microphone-alt"></i> 语音识物·实验室</h1>

  <div class="score-panel">
    <div class="score-box">
      <i class="fas fa-star"></i>
      <span id="scoreDisplay">0</span>
    </div>
    <div class="question-box">
      <i class="fas fa-flask"></i>
      <span id="progressDisplay">0 / 20</span>
    </div>
    <div class="timer-area">
      <i class="fas fa-hourglass-half"></i>
      <span class="timer-number" id="timerDisplay">15</span>
      <span>秒</span>
    </div>
  </div>

  <div class="canvas-card">
    <div class="drawing-container">
      <canvas id="equipmentCanvas" width="560" height="360"></canvas>
    </div>
  </div>

  <div class="feedback-area" id="feedbackMessage">
    <i class="fas fa-info-circle"></i>
    <span id="feedbackText">📸 点击「开始答题」，加载20件器材</span>
  </div>

  <div class="action-bar">
    <button class="btn btn-primary" id="startBtn"><i class="fas fa-play"></i> 开始答题</button>
    <button class="btn btn-mic" id="micBtn" disabled><i class="fas fa-microphone"></i> 点击说话</button>
    <button class="btn btn-warning" id="nextBtn" disabled><i class="fas fa-forward"></i> 下一题</button>
  </div>
  <div class="footer-note">
    <i class="fas fa-volume-up"></i> 点击麦克风，说出器材名称 · 每题15秒
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- 20个器材库 (含图片链接) ----------
    const ITEMS = [
      { id: 1, name: "抽滤瓶", synonyms: ["抽滤瓶"], imageUrl: "https://eyu333.github.io/index/images/抽滤瓶.jpg" },
      { id: 2, name: "带木柄的软橡胶球", synonyms: ["软橡胶球", "橡胶球", "带木柄的橡胶球"], imageUrl: "https://eyu333.github.io/index/images/带木柄的软橡胶球.jpg" },
      { id: 3, name: "导线", synonyms: ["导线", "电线"], imageUrl: "https://eyu333.github.io/index/images/导线.jpg" },
      { id: 4, name: "干电池", synonyms: ["干电池", "电池"], imageUrl: "https://eyu333.github.io/index/images/干电池.jpg" },
      { id: 5, name: "钢尺", synonyms: ["钢尺", "尺子", "钢直尺"], imageUrl: "https://eyu333.github.io/index/images/钢尺.jpg" },
      { id: 6, name: "光屏", synonyms: ["光屏", "屏幕"], imageUrl: "https://eyu333.github.io/index/images/光屏.jpg" },
      { id: 7, name: "搅拌棒（玻璃杯）", synonyms: ["搅拌棒", "玻璃搅拌棒", "玻璃棒"], imageUrl: "https://eyu333.github.io/index/images/搅拌棒.jpg" },
      { id: 8, name: "抹布", synonyms: ["抹布", "布"], imageUrl: "https://eyu333.github.io/index/images/抹布.jpg" },
      { id: 9, name: "木块", synonyms: ["木块", "木头"], imageUrl: "https://eyu333.github.io/index/images/木块.jpg" },
      { id: 10, name: "木片", synonyms: ["木片", "木板"], imageUrl: "https://eyu333.github.io/index/images/木片.jpg" },
      { id: 11, name: "气球", synonyms: ["气球"], imageUrl: "https://eyu333.github.io/index/images/气球.jpg" },
      { id: 12, name: "烧杯", synonyms: ["烧杯", "玻璃杯"], imageUrl: "https://eyu333.github.io/index/images/烧杯.jpg" },
      { id: 13, name: "手电筒", synonyms: ["手电筒", "手电"], imageUrl: "https://eyu333.github.io/index/images/手电筒.jpg" },
      { id: 14, name: "水槽", synonyms: ["水槽", "水盆"], imageUrl: "https://eyu333.github.io/index/images/水槽.jpg" },
      { id: 15, name: "塑料片", synonyms: ["塑料片", "塑料板"], imageUrl: "https://eyu333.github.io/index/images/塑料片.jpg" },
      { id: 16, name: "铜片", synonyms: ["铜片", "铜板"], imageUrl: "https://eyu333.github.io/index/images/铜片.jpg" },
      { id: 17, name: "洗手池", synonyms: ["洗手池", "水池"], imageUrl: "https://eyu333.github.io/index/images/洗手池.jpg" },
      { id: 18, name: "小灯泡", synonyms: ["小灯泡", "灯泡"], imageUrl: "https://eyu333.github.io/index/images/小灯泡.jpg" },
      { id: 19, name: "药勺", synonyms: ["药勺", "药匙"], imageUrl: "https://eyu333.github.io/index/images/药勺.jpg" },
      { id: 20, name: "音叉", synonyms: ["音叉"], imageUrl: "https://eyu333.github.io/index/images/音叉.jpg" }
    ];

    // ---------- 全局变量 ----------
    let currentScore = 0;
    let shuffledItems = [];
    let currentIndex = 0;
    let timerInterval = null;
    let timeLeft = 15;
    let isAnswered = false;
    let isGameActive = false;
    let recognition = null;
    let isRecognizing = false;
    let preloadedImages = new Map(); // 缓存图片对象

    const canvas = document.getElementById('equipmentCanvas');
    const ctx = canvas.getContext('2d');
    const CW = 560, CH = 360;
    canvas.width = CW; canvas.height = CH;

    const scoreDisplay = document.getElementById('scoreDisplay');
    const progressDisplay = document.getElementById('progressDisplay');
    const timerDisplay = document.getElementById('timerDisplay');
    const feedbackText = document.getElementById('feedbackText');
    const startBtn = document.getElementById('startBtn');
    const micBtn = document.getElementById('micBtn');
    const nextBtn = document.getElementById('nextBtn');

    // ---------- 辅助函数 ----------
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    function updateScoreAndProgress() {
      scoreDisplay.textContent = currentScore;
      progressDisplay.textContent = `${currentIndex + 1} / ${shuffledItems.length}`;
    }

    function abortRecognition() {
      if (recognition) {
        try { recognition.abort(); } catch(e) {}
      }
      isRecognizing = false;
    }

    function stopRecognition() {
      if (recognition) {
        try { recognition.stop(); } catch(e) {}
      }
      isRecognizing = false;
    }

    // 在canvas上绘制图片 (保持比例居中)
    function drawImageOnCanvas(img) {
      ctx.clearRect(0, 0, CW, CH);
      if (!img) {
        ctx.font = 'bold 24px sans-serif';
        ctx.fillStyle = '#345';
        ctx.textAlign = 'center';
        ctx.fillText('🖼️ 图片加载中...', CW/2, CH/2);
        return;
      }
      // 计算缩放比例 (contain)
      const scale = Math.min(CW / img.width, CH / img.height);
      const w = img.width * scale;
      const h = img.height * scale;
      const x = (CW - w) / 2;
      const y = (CH - h) / 2;
      ctx.drawImage(img, x, y, w, h);
    }

    // 预加载所有图片
    async function preloadAllImages() {
      const promises = ITEMS.map(item => {
        return new Promise((resolve) => {
          const img = new Image();
          img.crossOrigin = "Anonymous"; // 如有需要
          img.onload = () => {
            preloadedImages.set(item.id, img);
            resolve();
          };
          img.onerror = () => {
            console.warn(`图片加载失败: ${item.imageUrl}`);
            // 即使失败也resolve，以免阻塞，后续显示错误占位
            preloadedImages.set(item.id, null);
            resolve();
          };
          img.src = item.imageUrl;
        });
      });
      await Promise.all(promises);
    }

    // 绘制当前题目图片
    function drawCurrentItemImage() {
      const item = shuffledItems[currentIndex];
      const img = preloadedImages.get(item.id);
      if (img) {
        drawImageOnCanvas(img);
      } else {
        ctx.clearRect(0, 0, CW, CH);
        ctx.font = 'bold 20px sans-serif';
        ctx.fillStyle = '#a00';
        ctx.textAlign = 'center';
        ctx.fillText('❌ 图片加载失败', CW/2, CH/2-10);
        ctx.font = '18px sans-serif';
        ctx.fillText(item.name, CW/2, CH/2+30);
      }
    }

    // 结束游戏
    function endGame() {
      isGameActive = false;
      stopTimer();
      abortRecognition();
      micBtn.disabled = true;
      nextBtn.disabled = true;
      startBtn.disabled = false;
      
      feedbackText.innerHTML = `🎉 答题结束！ 总分: ${currentScore} / 100  ${currentScore === 100 ? '🏆 完美!' : '👏 继续加油'}`;
      timerDisplay.textContent = '—';
      ctx.clearRect(0, 0, CW, CH);
      ctx.font = 'bold 32px "Segoe UI", sans-serif';
      ctx.fillStyle = '#1e3a5f';
      ctx.textAlign = 'center';
      ctx.fillText('🏁 完成挑战', CW/2, CH/2-20);
      ctx.font = '24px sans-serif';
      ctx.fillText(`得分 ${currentScore}`, CW/2, CH/2+30);
    }

    // 加载题目
    function loadQuestion() {
      stopTimer();
      abortRecognition();
      if (!isGameActive) return;
      if (currentIndex >= shuffledItems.length) {
        endGame();
        return;
      }
      
      isAnswered = false;
      timeLeft = 15;
      timerDisplay.textContent = timeLeft;
      
      drawCurrentItemImage();
      updateScoreAndProgress();
      
      micBtn.disabled = false;
      nextBtn.disabled = false;
      
      const item = shuffledItems[currentIndex];
      feedbackText.innerHTML = `🔍 第 ${currentIndex+1} 题 · 点击🎤说出器材名称`;
      
      // 启动计时器
      timerInterval = setInterval(() => {
        if (!isGameActive || isAnswered) return;
        timeLeft--;
        timerDisplay.textContent = timeLeft;
        if (timeLeft <= 0) {
          timeLeft = 0;
          timerDisplay.textContent = '0';
          stopTimer();
          if (!isAnswered) {
            isAnswered = true;
            const currentItem = shuffledItems[currentIndex];
            feedbackText.innerHTML = `⏰ 超时！ 答案是 “${currentItem.name}”`;
            micBtn.disabled = true;
            nextBtn.disabled = true;
            setTimeout(() => {
              if (isGameActive) {
                currentIndex++;
                if (currentIndex < shuffledItems.length) loadQuestion();
                else endGame();
              }
            }, 1500);
          }
        }
      }, 1000);
    }

    // 语音识别初始化
    function initSpeech() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        feedbackText.innerHTML = '⚠️ 浏览器不支持语音识别';
        return null;
      }
      const recog = new SpeechRecognition();
      recog.continuous = false;
      recog.interimResults = false;
      recog.lang = 'zh-CN';
      recog.maxAlternatives = 3;
      
      recog.onstart = () => {
        isRecognizing = true;
        micBtn.innerHTML = '<i class="fas fa-microphone-alt"></i> 聆听中...';
        feedbackText.innerHTML = '🎙️ 正在聆听，请说出器材名称...';
      };
      recog.onerror = (e) => {
        isRecognizing = false;
        micBtn.innerHTML = '<i class="fas fa-microphone"></i> 点击说话';
        if (e.error === 'not-allowed') feedbackText.innerHTML = '❌ 麦克风权限被拒绝';
        else if (e.error === 'no-speech') feedbackText.innerHTML = '🤔 没有检测到语音';
        else feedbackText.innerHTML = `⚠️ 识别出错: ${e.error}`;
        if (!isAnswered && isGameActive) micBtn.disabled = false;
      };
      recog.onend = () => {
        isRecognizing = false;
        micBtn.innerHTML = '<i class="fas fa-microphone"></i> 点击说话';
        if (!isAnswered && isGameActive) micBtn.disabled = false;
      };
      recog.onresult = (event) => {
        if (!isGameActive || isAnswered) return;
        const results = event.results;
        let spoken = '';
        for (let i=0; i<results.length; i++) {
          for (let j=0; j<results[i].length; j++) {
            spoken += results[i][j].transcript + ' ';
          }
        }
        spoken = spoken.trim().toLowerCase();
        const currentItem = shuffledItems[currentIndex];
        const matched = currentItem.synonyms.some(s => spoken.includes(s.toLowerCase()));
        
        if (matched) {
          isAnswered = true;
          stopTimer();
          abortRecognition();
          currentScore += 5;  // 每题5分
          updateScoreAndProgress();
          feedbackText.innerHTML = `✅ 正确！ +5分 (你说: “${spoken}”)`;
          micBtn.disabled = true;
          nextBtn.disabled = true;
          setTimeout(() => {
            if (isGameActive) {
              currentIndex++;
              if (currentIndex < shuffledItems.length) loadQuestion();
              else endGame();
            }
          }, 1200);
        } else {
          feedbackText.innerHTML = `❌ 识别为 “${spoken}” ，不对哦，再试试`;
          micBtn.disabled = false;
        }
        stopRecognition();
      };
      return recog;
    }

    function handleMicClick() {
      if (!isGameActive || isAnswered) return;
      if (!recognition) recognition = initSpeech();
      if (!recognition) return;
      if (isRecognizing) stopRecognition();
      try {
        recognition.start();
        micBtn.disabled = true;
      } catch(e) {
        feedbackText.innerHTML = '⚠️ 语音启动失败';
        micBtn.disabled = false;
      }
    }

    function handleNext() {
      if (!isGameActive || isAnswered) return;
      isAnswered = true;
      stopTimer();
      abortRecognition();
      const currentItem = shuffledItems[currentIndex];
      feedbackText.innerHTML = `⏭️ 跳过本题，答案是 “${currentItem.name}”`;
      micBtn.disabled = true;
      nextBtn.disabled = true;
      setTimeout(() => {
        if (isGameActive) {
          currentIndex++;
          if (currentIndex < shuffledItems.length) loadQuestion();
          else endGame();
        }
      }, 1200);
    }

    async function startNewGame() {
      startBtn.disabled = true;
      feedbackText.innerHTML = '⏳ 正在加载20张图片，请稍候...';
      
      // 预加载图片
      await preloadAllImages();
      
      // 重置状态
      stopTimer();
      abortRecognition();
      currentScore = 0;
      shuffledItems = shuffleArray([...ITEMS]);
      currentIndex = 0;
      isGameActive = true;
      isAnswered = false;
      
      updateScoreAndProgress();
      timerDisplay.textContent = '15';
      
      drawCurrentItemImage();
      
      micBtn.disabled = false;
      nextBtn.disabled = false;
      
      feedbackText.innerHTML = '🎤 点击麦克风，说出器材名称！';
      
      if (!recognition) recognition = initSpeech();
      
      timeLeft = 15;
      timerInterval = setInterval(() => {
        if (!isGameActive || isAnswered) return;
        timeLeft--;
        timerDisplay.textContent = timeLeft;
        if (timeLeft <= 0) {
          timeLeft = 0; timerDisplay.textContent = '0';
          stopTimer();
          if (!isAnswered) {
            isAnswered = true;
            const cur = shuffledItems[currentIndex];
            feedbackText.innerHTML = `⏰ 超时！ 答案是 “${cur.name}”`;
            micBtn.disabled = true; nextBtn.disabled = true;
            setTimeout(() => {
              if (isGameActive) {
                currentIndex++;
                if (currentIndex < shuffledItems.length) loadQuestion();
                else endGame();
              }
            }, 1500);
          }
        }
      }, 1000);
    }

    // 绑定事件
    startBtn.addEventListener('click', startNewGame);
    micBtn.addEventListener('click', handleMicClick);
    nextBtn.addEventListener('click', handleNext);

    // 初始绘制提示
    ctx.font = 'bold 22px sans-serif';
    ctx.fillStyle = '#2a4b6e';
    ctx.textAlign = 'center';
    ctx.fillText('📦 20件器材待命', CW/2, CH/2-20);
    ctx.font = '18px sans-serif';
    ctx.fillText('点击「开始答题」', CW/2, CH/2+30);
  })();
</script>
</body>
</html>
