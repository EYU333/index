<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>实验器材语音识别 · 平板专用版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #eef2f7 0%, #d9e2ec 100%);
            color: #1a2c3e;
            line-height: 1.5;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Noto Sans', '微软雅黑', sans-serif;
            padding: 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1rem 1.2rem 2rem;
            background: rgba(255,255,255,0.7);
            border-radius: 56px;
            backdrop-filter: blur(4px);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #1e4663, #2b5a84);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .header p {
            font-size: 1rem;
            color: #2c5a7a;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 14px;
            background-color: #e2e8f0;
            border-radius: 30px;
            margin-bottom: 1.2rem;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2c9e5c, #45c97a);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 30px;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.05);
            margin-bottom: 1.8rem;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .score-board strong {
            color: #1e6f3f;
            font-size: 1.4rem;
            margin-left: 0.3rem;
        }

        .question-area {
            background: rgba(255,255,255,0.97);
            padding: 2rem 1.5rem;
            border-radius: 56px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            text-align: center;
            min-height: 580px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .equipment-image {
            max-width: 85%;
            max-height: 280px;
            object-fit: contain;
            margin: 1rem auto;
            border-radius: 32px;
            background: #fef9f0;
            padding: 0.8rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .control-btn {
            background: #2c6e9e;
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.4rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 0.6rem 0.8rem;
            min-width: 160px;
            box-shadow: 0 5px 0 #1a4a6e;
            touch-action: manipulation;
        }
        .control-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1a4a6e;
        }
        .control-btn.recording-active {
            background: #e67e22;
            box-shadow: 0 5px 0 #b45f1b;
            animation: micPulse 0.9s infinite;
        }
        @keyframes micPulse {
            0% { background-color: #e67e22; }
            50% { background-color: #f39c12; }
            100% { background-color: #e67e22; }
        }

        .status-message {
            margin: 1rem 0;
            padding: 1rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.05rem;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
        }
        .status-success { background: #d4f0dc; color: #0a5c2e; border-left: 8px solid #2ecc71; }
        .status-error { background: #ffe0e0; color: #b13e3e; border-left: 8px solid #e74c3c; }
        .status-info { background: #e3f0fc; color: #1f6392; border-left: 8px solid #3498db; }
        .status-warning { background: #fff0cf; color: #b45f1b; border-left: 8px solid #f39c12; }

        .timer-container {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #1e2f3f;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1.3rem;
            margin: 0.5rem 0 1rem;
        }
        .timer-countdown {
            animation: pulse 0.9s infinite;
            background: #ff5722;
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; background-color: #ff5722; }
            50% { transform: scale(1.08); opacity: 0.9; background-color: #ff3b00; }
            100% { transform: scale(1); opacity: 1; background-color: #ff5722; }
        }

        .question-number {
            font-size: 1.2rem;
            background: #ecf3f9;
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            color: #2c5a7a;
        }

        .hidden { display: none; }

        .mic-badge {
            background: #eef2fa;
            border-radius: 48px;
            padding: 0.6rem 1.2rem;
            margin: 1rem auto;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        @media (max-width: 800px) {
            .control-btn { padding: 0.8rem 1.2rem; font-size: 1.2rem; min-width: 130px; }
            .equipment-image { max-height: 220px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🧪 实验器材语音答题 · 平板优化</h1>
        <p>20种器材 · 每题5分 · 普通话说出名称</p>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="score-board">
        <div>🏆 得分: <strong id="current-score">0</strong> / 100</div>
        <div>📦 剩余: <strong id="remaining-questions">20</strong></div>
    </div>

    <div class="question-area">
        <!-- 启动界面 -->
        <div id="start-screen">
            <h2>🎙️ 平板智能语音答题</h2>
            <p style="margin: 0.8rem 0;">点击「开始答题」授权麦克风一次，之后全程免弹窗<br>直接点击「开始录音」说话即可识别</p>
            <div id="mic-status-badge" class="mic-badge">⚙️ 准备就绪，点击下方按钮授权麦克风</div>
            <button class="control-btn" id="start-quiz-btn" style="background:#27ae60; box-shadow:0 5px 0 #1e6f3f;">🔊 开始答题</button>
        </div>

        <!-- 答题界面 -->
        <div id="quiz-screen" class="hidden">
            <div class="question-number" id="question-number">第1题 / 共20题</div>
            <div class="timer-container">⏱️ 剩余 <span id="timer-countdown">15</span> 秒</div>
            <h3>🔍 请说出器材名称</h3>
            <img id="equipment-img" class="equipment-image" src="" alt="器材图片">
            <div id="status-message" class="status-message status-info">🎤 点击下方按钮开始录音</div>
            <button class="control-btn" id="record-btn">🎙️ 开始录音</button>
            <button class="control-btn" id="skip-btn" style="background:#a5693d;">⏩ 跳过此题</button>
        </div>

        <!-- 结束界面 -->
        <div id="end-screen" class="hidden">
            <h2>✨ 测验完成 ✨</h2>
            <p>最终得分: <strong id="final-score">0</strong> / 100</p>
            <div style="margin: 1rem 0;"><p id="result-text"></p></div>
            <button class="control-btn" id="reset-btn">🔄 重新挑战</button>
        </div>
    </div>
</div>

<script>
    // ---------- 20个器材数据 (同义词优化) ----------
    const equipmentList = [
        { id: 1, name: "抽滤瓶", synonyms: ["抽滤瓶"], imageUrl: "https://eyu333.github.io/index/images/抽滤瓶.jpg" },
        { id: 2, name: "带木柄的软橡胶球", synonyms: ["软橡胶球", "橡胶球", "带木柄的橡胶球"], imageUrl: "https://eyu333.github.io/index/images/带木柄的软橡胶球.jpg" },
        { id: 3, name: "导线", synonyms: ["导线", "电线"], imageUrl: "https://eyu333.github.io/index/images/导线.jpg" },
        { id: 4, name: "干电池", synonyms: ["干电池", "电池"], imageUrl: "https://eyu333.github.io/index/images/干电池.jpg" },
        { id: 5, name: "钢尺", synonyms: ["钢尺", "尺子", "钢直尺"], imageUrl: "https://eyu333.github.io/index/images/钢尺.jpg" },
        { id: 6, name: "光屏", synonyms: ["光屏", "屏幕"], imageUrl: "https://eyu333.github.io/index/images/光屏.jpg" },
        { id: 7, name: "搅拌棒", synonyms: ["搅拌棒", "玻璃棒", "玻璃搅拌棒"], imageUrl: "https://eyu333.github.io/index/images/搅拌棒.jpg" },
        { id: 8, name: "抹布", synonyms: ["抹布", "布"], imageUrl: "https://eyu333.github.io/index/images/抹布.jpg" },
        { id: 9, name: "木块", synonyms: ["木块", "木头"], imageUrl: "https://eyu333.github.io/index/images/木块.jpg" },
        { id: 10, name: "木片", synonyms: ["木片", "木板"], imageUrl: "https://eyu333.github.io/index/images/木片.jpg" },
        { id: 11, name: "气球", synonyms: ["气球"], imageUrl: "https://eyu333.github.io/index/images/气球.jpg" },
        { id: 12, name: "烧杯", synonyms: ["烧杯", "玻璃杯"], imageUrl: "https://eyu333.github.io/index/images/烧杯.jpg" },
        { id: 13, name: "手电筒", synonyms: ["手电筒", "手电"], imageUrl: "https://eyu333.github.io/index/images/手电筒.jpg" },
        { id: 14, name: "水槽", synonyms: ["水槽", "水盆"], imageUrl: "https://eyu333.github.io/index/images/水槽.jpg" },
        { id: 15, name: "塑料片", synonyms: ["塑料片", "塑料板"], imageUrl: "https://eyu333.github.io/index/images/塑料片.jpg" },
        { id: 16, name: "铜片", synonyms: ["铜片", "铜板"], imageUrl: "https://eyu333.github.io/index/images/铜片.jpg" },
        { id: 17, name: "洗手池", synonyms: ["洗手池", "水池"], imageUrl: "https://eyu333.github.io/index/images/洗手池.jpg" },
        { id: 18, name: "小灯泡", synonyms: ["小灯泡", "灯泡"], imageUrl: "https://eyu333.github.io/index/images/小灯泡.jpg" },
        { id: 19, name: "药勺", synonyms: ["药勺", "药匙"], imageUrl: "https://eyu333.github.io/index/images/药勺.jpg" },
        { id: 20, name: "音叉", synonyms: ["音叉"], imageUrl: "https://eyu333.github.io/index/images/音叉.jpg" }
    ];

    // ---------- 全局状态 ----------
    let quiz = {
        remainingList: [],       // 未答器材(随机顺序)
        current: null,
        score: 0,
        answeredCount: 0,
        total: 20,
        timerId: null,
        remainSec: 15,
        isRecording: false,
        recognition: null,
        mediaStream: null,       // 保持麦克风活跃，避免重复授权弹窗
        micAuthorized: false,
        isQuizActive: false
    };

    // DOM 元素
    const dom = {
        startScreen: document.getElementById('start-screen'),
        quizScreen: document.getElementById('quiz-screen'),
        endScreen: document.getElementById('end-screen'),
        currentScore: document.getElementById('current-score'),
        remainingQuestions: document.getElementById('remaining-questions'),
        equipmentImg: document.getElementById('equipment-img'),
        statusMsg: document.getElementById('status-message'),
        finalScore: document.getElementById('final-score'),
        progressFill: document.getElementById('progress-fill'),
        questionNumber: document.getElementById('question-number'),
        resultText: document.getElementById('result-text'),
        timerCountdown: document.getElementById('timer-countdown'),
        micBadge: document.getElementById('mic-status-badge'),
        startBtn: document.getElementById('start-quiz-btn'),
        recordBtn: document.getElementById('record-btn'),
        skipBtn: document.getElementById('skip-btn'),
        resetBtn: document.getElementById('reset-btn')
    };

    // 辅助函数
    function updateStatusMessage(msg, type = "info") {
        if (dom.statusMsg) {
            dom.statusMsg.textContent = msg;
            dom.statusMsg.className = `status-message status-${type}`;
        }
    }

    function updateUI() {
        dom.currentScore.textContent = Math.round(quiz.score);
        dom.remainingQuestions.textContent = quiz.remainingList.length;
        let progress = (quiz.answeredCount / quiz.total) * 100;
        dom.progressFill.style.width = `${progress}%`;
    }

    function stopTimer() {
        if (quiz.timerId) {
            clearInterval(quiz.timerId);
            quiz.timerId = null;
        }
    }

    // 停止录音 (如果正在录音)
    function abortSpeech() {
        if (quiz.isRecording && quiz.recognition) {
            try {
                quiz.recognition.abort();
            } catch(e) { /* 静默处理 */ }
            quiz.isRecording = false;
        }
        if (dom.recordBtn) dom.recordBtn.classList.remove('recording-active');
    }

    // 核心：请求麦克风权限并保持活跃流 (用于平板免二次弹窗)
    async function requestAndKeepMicrophone() {
        // 如果已有活跃流，直接返回 true
        if (quiz.mediaStream && quiz.mediaStream.active && quiz.mediaStream.getAudioTracks().some(t => t.enabled)) {
            quiz.micAuthorized = true;
            if (dom.micBadge) dom.micBadge.innerHTML = '✅ 麦克风已就绪 · 可直接录音';
            return true;
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            // 保持流，但不关闭，确保后续录音无额外授权弹窗
            quiz.mediaStream = stream;
            quiz.micAuthorized = true;
            if (dom.micBadge) dom.micBadge.innerHTML = '✅ 麦克风授权成功 · 全程免弹窗';
            return true;
        } catch (err) {
            console.error("麦克风授权失败:", err);
            let errMsg = '麦克风授权失败，请检查系统设置允许麦克风权限后刷新页面';
            if (err.name === 'NotAllowedError') errMsg = '❌ 您拒绝了麦克风权限，请在浏览器设置中允许麦克风后刷新';
            if (dom.micBadge) dom.micBadge.innerHTML = errMsg;
            updateStatusMessage(errMsg, 'error');
            return false;
        }
    }

    // 初始化语音识别实例 (每次开始答题时重新创建，确保干净)
    function initRecognition() {
        if (!('webkitSpeechRecognition' in window)) {
            alert("当前浏览器不支持语音识别，请使用 Chrome / Edge / Safari 并确保系统允许麦克风");
            return false;
        }
        if (quiz.recognition) {
            try { quiz.recognition.abort(); } catch(e) {}
        }
        const recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'zh-CN';
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            quiz.isRecording = true;
            if (dom.recordBtn) dom.recordBtn.classList.add('recording-active');
            updateStatusMessage("🎙️ 录音中，请清晰说出器材名称...", "info");
        };

        recognition.onresult = (event) => {
            let transcript = "";
            if (event.results.length > 0 && event.results[0][0]) {
                transcript = event.results[0][0].transcript.trim();
            }
            if (transcript === "") {
                updateStatusMessage("未识别到有效语音，请重新录音", "warning");
                abortSpeech();
                return;
            }
            // 识别成功，停止计时器并判题
            abortSpeech();      // 停止录音UI
            stopTimer();
            evaluateAnswer(transcript);
        };

        recognition.onerror = (event) => {
            console.warn("语音识别错误:", event.error);
            let errorText = "";
            switch (event.error) {
                case 'no-speech': errorText = "未检测到语音，请重新点击录音并大声说出"; break;
                case 'audio-capture': errorText = "麦克风不可用，请检查是否被其他应用占用"; break;
                case 'not-allowed': errorText = "麦克风权限被阻止，请重新授权后刷新页面"; break;
                default: errorText = `识别失败: ${event.error}`;
            }
            updateStatusMessage(errorText, "error");
            quiz.isRecording = false;
            if (dom.recordBtn) dom.recordBtn.classList.remove('recording-active');
            if (event.error === 'not-allowed') quiz.micAuthorized = false;
        };

        recognition.onend = () => {
            quiz.isRecording = false;
            if (dom.recordBtn) dom.recordBtn.classList.remove('recording-active');
            // 不自动重启，等待用户再次点击录音按钮
        };

        quiz.recognition = recognition;
        return true;
    }

    // 评判答案
    function evaluateAnswer(spoken) {
        if (!quiz.current) return;
        const correct = quiz.current.name;
        const synonyms = quiz.current.synonyms || [];
        const match = synonyms.some(syn => spoken.includes(syn));
        if (match) {
            quiz.score += 5;
            updateStatusMessage(`✅ 正确！ 你说：“${spoken}”`, "success");
        } else {
            updateStatusMessage(`❌ 错误！ 正确答案：${correct}，你说：“${spoken}”`, "error");
        }
        updateUI();
        // 延迟显示下一题
        setTimeout(() => nextQuestion(), 1800);
    }

    // 跳过当前题目
    function skipCurrent() {
        if (!quiz.current) return;
        abortSpeech();
        stopTimer();
        updateStatusMessage(`⏩ 已跳过，正确答案：${quiz.current.name}`, "warning");
        setTimeout(() => nextQuestion(), 1500);
    }

    // 展示下一题
    function nextQuestion() {
        stopTimer();
        abortSpeech();

        if (quiz.remainingList.length === 0) {
            finishQuiz();
            return;
        }

        quiz.current = quiz.remainingList.pop();
        quiz.answeredCount++;
        quiz.remainSec = 15;

        // 更新界面
        dom.equipmentImg.src = quiz.current.imageUrl;
        dom.equipmentImg.alt = quiz.current.name;
        dom.questionNumber.textContent = `第${quiz.answeredCount}题 / 共${quiz.total}题`;
        dom.timerCountdown.textContent = quiz.remainSec;
        dom.timerCountdown.classList.remove('timer-countdown');
        updateStatusMessage("🎤 点击「开始录音」说出器材名称", "info");
        updateUI();

        // 启动倒计时
        startTimerForCurrent();
    }

    function startTimerForCurrent() {
        stopTimer();
        quiz.timerId = setInterval(() => {
            if (quiz.remainSec <= 1) {
                stopTimer();
                abortSpeech();
                if (quiz.current) {
                    updateStatusMessage(`⏰ 时间到！正确答案：${quiz.current.name}`, "warning");
                    setTimeout(() => nextQuestion(), 1800);
                }
            } else {
                quiz.remainSec--;
                dom.timerCountdown.textContent = quiz.remainSec;
                if (quiz.remainSec <= 5) {
                    dom.timerCountdown.classList.add('timer-countdown');
                } else {
                    dom.timerCountdown.classList.remove('timer-countdown');
                }
            }
        }, 1000);
    }

    // 结束答题
    function finishQuiz() {
        stopTimer();
        abortSpeech();
        dom.quizScreen.classList.add('hidden');
        dom.endScreen.classList.remove('hidden');
        let finalScoreVal = Math.round(quiz.score);
        dom.finalScore.textContent = finalScoreVal;
        let comment = "";
        if (finalScoreVal >= 90) comment = "🎉 优秀！实验器材大师！";
        else if (finalScoreVal >= 80) comment = "👍 良好，再熟悉一下满分在望";
        else if (finalScoreVal >= 60) comment = "📚 合格，多加练习会更棒";
        else comment = "💪 需要加强记忆，重新挑战吧";
        dom.resultText.textContent = comment;
        quiz.isQuizActive = false;
    }

    // 重置答题 (保留麦克风流)
    function resetQuiz() {
        stopTimer();
        abortSpeech();
        dom.endScreen.classList.add('hidden');
        dom.startScreen.classList.remove('hidden');
        dom.quizScreen.classList.add('hidden');
        dom.progressFill.style.width = "0%";
        // 重置状态，但保留 mediaStream 和 micAuthorized
        quiz.remainingList = [];
        quiz.current = null;
        quiz.score = 0;
        quiz.answeredCount = 0;
        quiz.remainSec = 15;
        quiz.isRecording = false;
        quiz.isQuizActive = false;
        updateUI();
        if (quiz.micAuthorized && dom.micBadge) {
            dom.micBadge.innerHTML = '✅ 麦克风已就绪 · 可重新开始';
        } else {
            if (dom.micBadge) dom.micBadge.innerHTML = '🎤 点击“开始答题”重新授权麦克风';
        }
    }

    // 开始答题主流程 (授权 + 初始化识别 + 随机题目)
    async function startQuizFlow() {
        // 防止重复进入
        if (!dom.startScreen.classList.contains('hidden') === false) return;
        // 1. 请求麦克风权限 (关键：保持流，后续免弹窗)
        const micOk = await requestAndKeepMicrophone();
        if (!micOk) {
            updateStatusMessage("无法获得麦克风权限，语音答题不可用", "error");
            return;
        }
        // 2. 初始化语音识别 (如果已有实例则重新创建确保干净)
        const initOk = initRecognition();
        if (!initOk) return;

        // 3. 随机打乱器材列表
        const shuffled = [...equipmentList];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        quiz.remainingList = shuffled;
        quiz.score = 0;
        quiz.answeredCount = 0;
        quiz.current = null;
        quiz.isQuizActive = true;
        stopTimer();
        abortSpeech();
        updateUI();

        // 界面切换
        dom.startScreen.classList.add('hidden');
        dom.quizScreen.classList.remove('hidden');
        dom.endScreen.classList.add('hidden');

        // 展示第一题
        nextQuestion();
    }

    // 录音按钮逻辑：平板必须保证在用户手势同步调用 recognition.start()
    // 注意：这里不能有任何异步等待，确保立即启动
    function onRecordPress() {
        if (!quiz.isQuizActive || !quiz.current) {
            updateStatusMessage("答题未开始或题目未加载，请稍后", "warning");
            return;
        }
        // 检查麦克风授权标志
        if (!quiz.micAuthorized || !quiz.recognition) {
            updateStatusMessage("麦克风未就绪，请重新开始答题", "error");
            return;
        }
        if (quiz.isRecording) {
            updateStatusMessage("正在录音中，请稍等回答", "warning");
            return;
        }
        // 关键：直接同步调用 start()，无任何异步操作
        try {
            quiz.recognition.start();
        } catch (err) {
            console.error("启动录音失败", err);
            updateStatusMessage("启动录音失败，可能是麦克风资源冲突，请重试", "error");
            quiz.isRecording = false;
        }
    }

    // 事件绑定 (平板触摸)
    function bindEvents() {
        if (dom.startBtn) dom.startBtn.addEventListener('click', startQuizFlow);
        if (dom.recordBtn) dom.recordBtn.addEventListener('click', onRecordPress);
        if (dom.skipBtn) dom.skipBtn.addEventListener('click', skipCurrent);
        if (dom.resetBtn) dom.resetBtn.addEventListener('click', resetQuiz);
    }

    // 浏览器预检
    function preCheck() {
        if (!('webkitSpeechRecognition' in window)) {
            if (dom.micBadge) dom.micBadge.innerHTML = "⚠️ 浏览器不支持语音识别，请使用Chrome/Edge/Safari";
            dom.startBtn.disabled = true;
            dom.startBtn.style.opacity = "0.6";
        } else {
            if (dom.micBadge) dom.micBadge.innerHTML = "🎤 点击“开始答题”授权麦克风，之后全程无弹窗";
        }
    }

    // 页面初始化
    bindEvents();
    preCheck();

    // 可选：页面关闭时释放音频流，避免资源占用
    window.addEventListener('beforeunload', () => {
        if (quiz.mediaStream) {
            quiz.mediaStream.getTracks().forEach(track => track.stop());
        }
        if (quiz.recognition) {
            try { quiz.recognition.abort(); } catch(e) {}
        }
    });
</script>
